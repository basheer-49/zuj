<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق الطالب</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    background:#dfe2e5;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:#dfe2e5;
}

/* البانر - أطول بنسبة بسيطة */
.banner{
    width:84%;
    height:210px;
    margin:22px auto 10px;
    border-radius:24px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.banner-title{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:30px;
    font-weight:bold;
}

/* ===== المستطيل الجديد تحت البانر ===== */
.notification-bar {
    width:88%;
    margin:0 auto 16px;
    background:#fff;
    border-radius:14px;
    padding:20px 18px;
    display:flex;
    align-items:center;
    gap:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    cursor:pointer;
}

.notification-bar .notif-icon {
    width:32px;
    height:32px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
}

.notification-bar .notif-icon img {
    width:32px;
    height:32px;
    object-fit:contain;
}

.notification-bar .notif-texts {
    display:flex;
    flex-direction:column;
    gap:2px;
    flex:1;
}

.notification-bar .notif-title {
    font-size:14px;
    font-weight:700;
    color:#25a244;
    line-height:1.3;
}

.notification-bar .notif-sub {
    font-size:12px;
    color:#999;
    font-weight:400;
    line-height:1.3;
}

/* البطاقات */
.grid{
    width:88%;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.card{
    background:#fff;
    height:140px;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.card i{
    font-size:42px;
    color:#25a244;
    margin-bottom:10px;
}

.card .card-icon-img {
    width:42px;
    height:42px;
    object-fit:contain;
    margin-bottom:10px;
}

.card span{
    font-size:15px;
    color:#000;
}

.space{
    height:180px;
}

/* الشريط السفلي (الصفحة الرئيسية) */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    height:72px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
}

.nav-item i{
    font-size:22px;
}

.nav-item span{
    font-size:12px;
    margin-top:4px;
}

.active{
    color:#25a244;
}

.inactive{
    color:#cfcfcf;
}

/* ===== صفحة الإعدادات - معدلة ===== */
.settings-container{
    display:none;
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:#edf0f3;
    position:relative;
}

.settings-page{
    width:100%;
    background:#edf0f3;
    padding-bottom:90px;
}

.page-title{
    padding:18px 18px 10px; /* قللت padding السفلي */
    font-size:18px;
    font-weight:600;
    color:#222;
}

/* المربع الشخصي - أقصر */
.profile-card{
    background:#fff;
    width:calc(100% - 24px);
    margin:0 auto;
    height:130px; /* كانت 160px */
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.profile-wrapper{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    width:100%;
}

.avatar{
    width:60px; /* كانت 64px */
    height:60px; /* كانت 64px */
    border:3px solid #d5d5d5;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px; /* كانت 24px */
    color:#b5b5b5;
}

.student-number{
    font-size:15px;
    color:#a5a5a5;
}

/* قائمة الإعدادات - أقصر ومرفوعة للأعلى */
.menu-card{
    background:#fff;
    width:calc(100% - 24px);
    margin:8px auto 20px; /* قللت margin-top من 14px إلى 8px */
    border-radius:16px;
    overflow:hidden;
}

.menu-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px; /* كانت 20px 20px */
    text-decoration:none;
    color:#222;
    transition:.2s;
    cursor:pointer;
}

.menu-item:active{
    background:#f5f5f5;
}

.menu-icon{
    width:30px;
    text-align:center;
    font-size:18px;
}

.menu-text{
    flex:1;
    text-align:right;
    padding-right:12px;
    font-size:15px;
}

.arrow{
    font-size:16px;
    color:#888;
}

.logout{
    color:#b27f7f;
}

/* الشريط السفلي لصفحة الإعدادات */
.bottom-nav-settings{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    height:70px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -2px 8px rgba(0,0,0,.05);
}

.nav-item-settings{
    text-align:center;
    cursor:pointer;
}

.nav-item-settings i{
    font-size:18px;
    display:block;
    margin-bottom:3px;
}

.nav-item-settings span{
    font-size:11px;
}

.nav-item-settings.active{
    color:#1ea64a;
}

.nav-item-settings.inactive{
    color:#d0d0d0;
}

</style>
</head>
<body>

<!-- ===== الصفحة الرئيسية ===== -->
<div id="homePage" class="container">
    <div class="banner" onclick="alert('تم الضغط على البانر')">
        <img src="https://i.postimg.cc/d1Mwc4pb/Untitled-design.png" alt="">
        <div class="banner-title">أهلا</div>
    </div>

    <div class="notification-bar" onclick="alert('تنبيهاتي')">
        <div class="notif-icon">
            <img src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcQtvjtePMpB8NQDMqTDQg_QUGAYY0QV4VnmLeqioDSZ55NcRmkX" alt="icon">
        </div>
        <div class="notif-texts">
            <span class="notif-title">تنبيهاتي</span>
            <span class="notif-sub">لا مانع من دخول الطالب للإمتحان</span>
        </div>
    </div>

    <div class="grid">
        <div class="card" onclick="alert('أكاديمي')">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>أكاديمي</span>
        </div>
        <div class="card" onclick="alert('لوحة التحكم')">
            <img class="card-icon-img" src="https://github.com/basheer-49/zuj/blob/main/Untitled%20(1080%20x%20962%20px)%20(1).png?raw=true" alt="لوحة التحكم">
            <span>لوحة التحكم</span>
        </div>
        <div class="card" onclick="alert('التسجيل')">
            <i class="fa-solid fa-id-card"></i>
            <span>التسجيل</span>
        </div>
        <div class="card" onclick="alert('شخصي')">
            <i class="fa-solid fa-address-card"></i>
            <span>شخصي</span>
        </div>
    </div>

    <div class="space"></div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="alert('الرئيسية')">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item inactive" onclick="alert('الإشعارات')">
            <i class="fa-solid fa-bell"></i>
        </div>
        <div class="nav-item inactive" id="settingsBtn">
            <i class="fa-solid fa-gear"></i>
        </div>
    </div>
</div>

<!-- ===== صفحة الإعدادات ===== -->
<div id="settingsPage" class="settings-container">
    <div class="settings-page">
        <div class="page-title">الإعدادات</div>

        <div class="profile-card">
            <div class="profile-wrapper">
                <div class="avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="student-number">202512948</div>
            </div>
        </div>

        <div class="menu-card">
            <div class="menu-item" onclick="alert('نبذة عنا')">
                <div class="menu-icon"><i class="fa-solid fa-circle-info"></i></div>
                <div class="menu-text">نبذة عنا</div>
            </div>

            <div class="menu-item" onclick="alert('هوية الطالب')">
                <div class="menu-icon"><i class="fa-regular fa-id-card"></i></div>
                <div class="menu-text">هوية الطالب</div>
            </div>

            <a href="https://github.com/basheer-49/zuj/blob/main/%D8%A8%D8%B7%D8%A7%D9%82%D8%A9%20%D8%AF%D8%AE%D9%88%D9%84%20%D8%A7%D9%84%D8%A7%D9%85%D8%AA%D8%AD%D8%A7%D9%86%D8%A7%D8%AA.png?raw=true" target="_blank" class="menu-item" style="text-decoration:none; color:#222;">
                <div class="menu-icon"><i class="fa-regular fa-address-card"></i></div>
                <div class="menu-text">بطاقة دخول الامتحان</div>
            </a>

            <div class="menu-item" onclick="alert('معرض الصور')">
                <div class="menu-icon"><i class="fa-regular fa-image"></i></div>
                <div class="menu-text">معرض الصور</div>
            </div>

            <div class="menu-item" onclick="alert('اللغة')">
                <div class="menu-icon"><i class="fa-solid fa-globe"></i></div>
                <div class="menu-text">اللغة</div>
            </div>

            <div class="menu-item" onclick="alert('خروج')">
                <div class="arrow"><i class="fa-solid fa-chevron-down"></i></div>
                <div class="menu-text logout">خروج</div>
                <div class="menu-icon"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav-settings">
        <div class="nav-item-settings active" id="settingsActiveBtn">
            <i class="fa-solid fa-gear"></i>
            <span>الإعدادات</span>
        </div>
        <div class="nav-item-settings inactive" onclick="alert('الإشعارات')">
            <i class="fa-regular fa-bell"></i>
        </div>
        <div class="nav-item-settings inactive" id="homeFromSettingsBtn">
            <i class="fa-solid fa-house"></i>
        </div>
    </div>
</div>

<script>
    const homePage = document.getElementById('homePage');
    const settingsPage = document.getElementById('settingsPage');
    const settingsBtn = document.getElementById('settingsBtn');
    const homeFromSettingsBtn = document.getElementById('homeFromSettingsBtn');

    settingsBtn.onclick = function() {
        homePage.style.display = 'none';
        settingsPage.style.display = 'block';
    }

    homeFromSettingsBtn.onclick = function() {
        settingsPage.style.display = 'none';
        homePage.style.display = 'block';
    }
</script>

</body>
</html>
